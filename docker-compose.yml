version: "3.9"
services:
  web:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/app.db
      SYNC_TASKS: "false"
    ports:
      - "5000:5000"
    volumes:
      - ./generated_sites:/app/generated_sites
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_started
    command: python app.py

  worker:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/app.db
      SYNC_TASKS: "false"
    volumes:
      - ./generated_sites:/app/generated_sites
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_started
    command: celery -A app.celery_app worker --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: wa_ai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  fastapi:
    build: .
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/wa_ai
      SYNC_TASKS: "false"
    ports:
      - "8000:8000"
    command: uvicorn fastapi_app:app --host 0.0.0.0 --port 8000
    depends_on:
      - redis
      - postgres

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_WS_URL: ws://localhost:5000
    depends_on:
      - web

volumes:
  app_data:
  pg_data:
